:root{
  --bg-0:#08070a;--bg-1:#0e0c0f;--bg-2:#151217;--bg-3:#1d1a21;
  --surface-glass:rgba(255,255,255,0.045);--surface-glass-strong:rgba(255,255,255,0.08);
  --border-glass:rgba(255,255,255,0.09);--border-glass-strong:rgba(255,255,255,0.17);
  --ink-0:#f3ede1;--ink-1:#d2cabd;--ink-2:#9d948a;--ink-3:#756d66;
  --gold-100:#f4e3ad;--gold-300:#e3c470;--gold-500:#cda144;--gold-700:#a07b2c;
  --gold-grad:linear-gradient(135deg,#f4e3ad 0%,#cda144 45%,#8a6521 100%);
  --emerald-300:#6fd5a8;--emerald-500:#2f9e6e;
  --radius-sm:10px;--radius-md:16px;--radius-lg:24px;
  --shadow-soft:0 8px 30px rgba(0,0,0,.35);
  --eo:cubic-bezier(0.23,1,0.32,1);
  --font-display:"Fraunces","Iowan Old Style",Georgia,serif;
  --font-sans:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%,rgba(205,161,68,.09),transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%,rgba(47,158,110,.05),transparent 55%),
    var(--bg-0);
  color:var(--ink-0);font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
h1,h2,h3{font-family:var(--font-display);font-weight:500;letter-spacing:-.01em}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,select{font-family:inherit;color:inherit}
a{text-decoration:none;color:inherit}
::selection{background:rgba(205,161,68,.35)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
:focus-visible{outline:2px solid var(--gold-300);outline-offset:2px;border-radius:4px}

.app{width:100%;max-width:480px;height:100dvh;margin:0 auto;position:relative;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:max(env(safe-area-inset-top),20px) 18px 150px 18px}
.glass{background:linear-gradient(155deg,var(--surface-glass-strong),var(--surface-glass));
  border:1px solid var(--border-glass);border-radius:var(--radius-lg);box-shadow:var(--shadow-soft)}
.gold-text{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.btn-primary{background:var(--gold-grad);color:#1a1206;border-radius:var(--radius-md);font-weight:700;letter-spacing:.01em;
  box-shadow:0 6px 24px rgba(205,161,68,.28);transition:transform .15s var(--eo),box-shadow .15s,filter .15s;position:relative;overflow:hidden}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:var(--surface-glass);border:1px solid var(--border-glass);color:var(--ink-0);border-radius:var(--radius-md);
  transition:transform .15s var(--eo),background .15s,border-color .15s}
.btn-ghost:active{transform:scale(.96)}
.tap{transition:transform .12s var(--eo)}
.tap:active{transform:scale(.95)}

/* screen transitions */
.screen{animation-duration:.26s;animation-timing-function:var(--eo);animation-fill-mode:both}
.anim-push{animation-name:slide-push}
.anim-pop{animation-name:slide-pop}
.anim-fade{animation-name:fade-up}
@keyframes slide-push{from{opacity:0;transform:translateX(46px)}to{opacity:1;transform:none}}
@keyframes slide-pop{from{opacity:0;transform:translateX(-46px)}to{opacity:1;transform:none}}
@keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* tab bar + tray */
.bottom-stack{position:absolute;bottom:0;left:0;right:0;z-index:50;display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:0 20px calc(max(env(safe-area-inset-bottom),14px)) 20px;pointer-events:none}
.bottom-stack>*{pointer-events:auto}
.tab-bar{width:100%;max-width:440px;display:flex;justify-content:space-around;align-items:center;padding:9px 8px;border-radius:26px;
  background:rgba(21,18,23,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 18px;border-radius:18px;color:var(--ink-2);
  font-size:11px;font-weight:600;letter-spacing:.02em;transition:color .2s,background .2s}
.tab-item.active{color:var(--gold-300);background:rgba(205,161,68,.1)}
.tray{width:100%;max-width:440px;border-radius:20px;padding:10px 12px;display:flex;align-items:center;gap:10px;
  background:rgba(29,26,33,.96);border:1px solid rgba(205,161,68,.28);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fade-up .3s var(--eo)}
.tray-chips{flex:1;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tray-chips::-webkit-scrollbar{display:none}
.tray-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:12px;font-size:12px;font-weight:600;
  background:var(--surface-glass);border:1px solid var(--border-glass);color:var(--ink-1);white-space:nowrap}
.tray-chip.done{color:var(--emerald-300);border-color:rgba(47,158,110,.35)}
.tray-finish{flex-shrink:0;padding:9px 16px;border-radius:12px;font-size:12.5px}

/* headers */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.ph-left{display:flex;align-items:center;gap:12px;min-width:0}
.back-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;
  background:var(--surface-glass);border:1px solid var(--border-glass);color:var(--ink-0);flex-shrink:0}
.icon-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;
  background:var(--surface-glass);border:1px solid var(--border-glass);color:var(--ink-1);flex-shrink:0}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-300);margin-bottom:2px}
.title{font-size:26px;color:var(--ink-0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* body diagram */
.body-diagram{display:flex;flex-direction:column;align-items:center;gap:12px}
.body-svg{width:auto;max-width:100%;height:auto;filter:drop-shadow(0 20px 40px rgba(0,0,0,.5))}
.body-svg.full{max-height:46vh}
.body-svg.compact{max-height:230px}
.muscle-tile{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:filter .18s,opacity .18s}
.muscle-tile:focus-visible{outline:none;stroke:var(--gold-300);stroke-width:2.5}
.view-toggle{display:flex;padding:4px;border-radius:999px;gap:2px;background:var(--surface-glass);border:1px solid var(--border-glass)}
.vt-btn{color:var(--ink-2);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:6px 18px;border-radius:999px;transition:color .2s,background .2s}
.vt-btn.active{background:var(--gold-grad);color:#1a1206}
.heat-legend{display:flex;flex-direction:column;gap:6px;width:100%}
.heat-legend-bar{display:flex;width:100%;height:6px;border-radius:999px;overflow:hidden}
.heat-legend-bar>div{flex:1}
.heat-legend-labels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-2)}
.scrub{display:flex;align-items:center;gap:10px;width:100%;margin-top:4px}
.scrub input[type=range]{flex:1;accent-color:var(--gold-500);height:22px}
.scrub-label{font-size:11.5px;color:var(--ink-2);min-width:86px;text-align:right;font-weight:600}

/* lists */
.section-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);margin-bottom:10px;padding-left:2px}
.rows{display:flex;flex-direction:column;gap:8px}
.muscle-row{display:flex;align-items:center;gap:12px;width:100%;padding:13px 16px;background:var(--surface-glass);
  border:1px solid var(--border-glass);border-radius:var(--radius-md);text-align:left}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.muscle-row-label{flex:1;font-size:14.5px;font-weight:600}
.muscle-row-meta{font-size:12px;color:var(--ink-2)}
.level-chip{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid}
.list-row{display:flex;align-items:center;gap:13px;width:100%;padding:13px 15px;background:var(--surface-glass);
  border:1px solid var(--border-glass);border-radius:var(--radius-md);text-align:left}
.equip{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--gold-200,#e3c470);
  background:linear-gradient(155deg,rgba(205,161,68,.18),rgba(205,161,68,.05));border:1px solid rgba(205,161,68,.22);flex-shrink:0}
.list-row-body{flex:1;min-width:0}
.list-row-title{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-row-sub{font-size:11.5px;color:var(--ink-2);margin-top:2px}
.search-input{width:100%;padding:13px 16px;background:var(--surface-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-md);color:var(--ink-0);font-size:14.5px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--border-glass-strong)}
.search-input::placeholder{color:var(--ink-3)}
.empty{text-align:center;padding:34px 20px;color:var(--ink-2);font-size:13.5px;display:flex;flex-direction:column;align-items:center;gap:14px}
.empty .btn-primary{padding:11px 22px;font-size:13.5px}

/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-cell{display:flex;flex-direction:column;gap:3px;padding:13px 12px;background:var(--surface-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md)}
.stat-value{font-family:var(--font-display);font-size:22px;font-variant-numeric:tabular-nums}
.stat-value small{font-size:11px;color:var(--ink-2);font-family:var(--font-sans);font-weight:600;margin-left:2px}
.stat-label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:800;letter-spacing:.04em;
  background:rgba(205,161,68,.14);color:var(--gold-300);border:1px solid rgba(205,161,68,.25)}
.pill-em{background:rgba(47,158,110,.14);color:var(--emerald-300);border-color:rgba(47,158,110,.25)}
.field-label{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink-2);margin-bottom:6px}
.inc-btn{flex:1;padding:8px 0;font-size:12.5px;font-weight:700;border-radius:10px}
.rpe-btn{flex:1;padding:9px 0;font-size:13px;font-weight:700;border-radius:10px}
.rpe-btn.active{background:var(--gold-grad);color:#1a1206;border-color:transparent}
.metric-btn{background:var(--surface-glass);border:1px solid var(--border-glass);color:var(--ink-2);font-size:11px;font-weight:700;
  padding:6px 12px;border-radius:999px;transition:color .2s,background .2s}
.metric-btn.active{background:rgba(205,161,68,.16);color:var(--gold-300);border-color:rgba(205,161,68,.3)}
.vol-track{width:100%;height:9px;border-radius:999px;background:rgba(255,255,255,.05);overflow:hidden}
.vol-fill{height:100%;border-radius:999px;transition:width .7s var(--eo)}
.week-day{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.ghost-line{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.03);
  border:1px dashed rgba(255,255,255,.12);font-size:12.5px;color:var(--ink-1);margin-bottom:12px;flex-wrap:wrap}
.hint-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:700;
  background:rgba(47,158,110,.12);color:var(--emerald-300);border:1px solid rgba(47,158,110,.3);margin-bottom:12px}

/* rest timer */
.rest-timer{display:flex;align-items:center;gap:14px;padding:12px 16px;margin-bottom:14px;animation:fade-up .3s var(--eo)}
.rt-ring{position:relative;width:52px;height:52px;flex-shrink:0}
.rt-ring svg{transform:rotate(-90deg)}
.rt-time{font-family:var(--font-display);font-size:21px;font-variant-numeric:tabular-nums}
.rt-actions{display:flex;gap:6px}
.rt-mini{padding:6px 10px;font-size:11px;font-weight:700;border-radius:9px}

/* sheets & toasts */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:90;opacity:0;transition:opacity .25s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.sheet-backdrop.show{opacity:1}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:91;background:var(--bg-2);border-radius:24px 24px 0 0;
  border:1px solid var(--border-glass);border-bottom:none;padding:10px 20px calc(max(env(safe-area-inset-bottom),16px) + 10px) 20px;
  transform:translateY(105%);transition:transform .32s var(--eo);max-height:80dvh;overflow-y:auto}
.sheet.show{transform:none}
.sheet-handle{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.18);margin:4px auto 16px}
.sheet h2{font-size:20px;margin-bottom:16px}
.toast{position:absolute;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(max(env(safe-area-inset-bottom),14px) + 78px);
  z-index:95;background:var(--bg-3);border:1px solid var(--border-glass-strong);border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:14px;font-size:13px;font-weight:600;box-shadow:0 14px 40px rgba(0,0,0,.6);
  opacity:0;transition:all .3s var(--eo);max-width:calc(100% - 40px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast button{color:var(--gold-300);font-weight:800;font-size:13px;flex-shrink:0}

/* PR celebration */
@keyframes shimmer-sweep{from{transform:translateX(-110%) skewX(-18deg)}to{transform:translateX(240%) skewX(-18deg)}}
.shimmer{position:absolute;inset:0;overflow:hidden;border-radius:inherit;pointer-events:none}
.shimmer::after{content:"";position:absolute;top:0;bottom:0;width:45%;
  background:linear-gradient(100deg,transparent,rgba(244,227,173,.35),transparent);animation:shimmer-sweep .9s var(--eo) 2}
@keyframes pr-pop{0%{transform:scale(.6);opacity:0}55%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.pr-pop{animation:pr-pop .5s var(--eo)}
@keyframes tile-glow{0%,100%{filter:none}50%{filter:drop-shadow(0 0 12px var(--glow,#cda144))}}
.tile-pulse{animation:tile-glow .9s ease}

/* onboarding */
.onboard{position:absolute;inset:0;z-index:100;background:
  radial-gradient(ellipse 700px 420px at 50% -8%,rgba(205,161,68,.13),transparent 60%),var(--bg-0);
  display:flex;flex-direction:column;justify-content:center;padding:40px 32px calc(max(env(safe-area-inset-bottom),20px) + 30px) 32px}
.onboard-step{animation:fade-up .4s var(--eo)}
.onboard h1{font-size:38px;line-height:1.1;margin:18px 0 10px}
.onboard p{color:var(--ink-1);font-size:15px;line-height:1.55}
.unit-pick{display:flex;gap:10px;margin-top:24px}
.unit-btn{flex:1;padding:20px 0;border-radius:18px;font-size:16px;font-weight:800;background:var(--surface-glass);border:1.5px solid var(--border-glass);transition:all .2s}
.unit-btn.active{border-color:var(--gold-500);background:rgba(205,161,68,.12);color:var(--gold-300)}
.onboard-dots{display:flex;gap:6px;justify-content:center;margin-bottom:22px}
.onboard-dots div{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.16);transition:all .3s}
.onboard-dots .on{background:var(--gold-300);width:18px;border-radius:99px}
@media(min-width:521px){
  .app{border-left:1px solid rgba(255,255,255,.06);border-right:1px solid rgba(255,255,255,.06);box-shadow:0 0 90px rgba(205,161,68,.05)}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="content" id="content"></div>
  <div class="bottom-stack" id="bottom-stack">
    <div id="tray-host" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:8px"></div>
    <nav class="tab-bar" id="tabbar"></nav>
  </div>
  <div id="overlay-host"></div>
</div>

<script>
"use strict";
/* =============== storage =============== */
var KEY="forge-store-v2", OLD_KEY="forge-fitness-store";
function defaults(){return{version:2,sets:[],customExercises:[],templates:[],
  profile:{name:"",unit:"lb",onboarded:false,restDuration:90,activeQueue:null,lastFinished:0,lastBackupAt:0}};}
function loadState(){
  try{
    var raw=localStorage.getItem(KEY);
    if(raw){var s=JSON.parse(raw);var d=defaults();s.profile=Object.assign(d.profile,s.profile||{});
      s.sets=s.sets||[];s.customExercises=s.customExercises||[];s.templates=s.templates||[];return s;}
    var old=localStorage.getItem(OLD_KEY);
    if(old){var o=JSON.parse(old);var m=defaults();m.sets=o.sets||[];m.customExercises=o.customExercises||[];return m;}
  }catch(e){}
  return defaults();
}
var state=loadState();
var storageOk=true;
function save(){
  try{
    localStorage.setItem(KEY,JSON.stringify(state));
    if(!storageOk){storageOk=true;updateStorageBanner();}
  }catch(e){
    if(storageOk){
      storageOk=false;updateStorageBanner();
      showToast("Couldn't save — storage unavailable. Export your data now.",null,null,8000);
    }
  }
}
function updateStorageBanner(){
  var b=document.getElementById("storage-banner");
  if(!storageOk&&!b){
    b=el('<button id="storage-banner" role="alert" style="position:absolute;top:0;left:0;right:0;z-index:80;background:#5a2323;color:#f3d8d8;font-size:12px;font-weight:700;padding:10px 16px;text-align:center;border:none;border-radius:0">Storage unavailable — changes are NOT being saved. Tap to export.</button>');
    b.onclick=function(){nav("/settings");};
    document.getElementById("app").appendChild(b);
  }else if(storageOk&&b)b.remove();
}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}

/* =============== units =============== */
var LB_PER_KG=2.2046226218;
function unit(){return state.profile.unit;}
function toDisp(lb){var v=unit()==="kg"?lb/LB_PER_KG:lb;return Math.round(v*100)/100;}
function fromDisp(v){return unit()==="kg"?v*LB_PER_KG:v;}
function fmtW(lb){var v=toDisp(lb);return (Math.round(v*10)/10).toString().replace(/\.0$/,"");}
function incSteps(){return unit()==="kg"?[-2.5,-1.25,1.25,2.5]:[-5,-2.5,2.5,5];}
function clampW(lb){lb=Number(lb);if(!isFinite(lb)||lb<0)return 0;return Math.min(lb,4000);}
function clampReps(r){r=Math.round(Number(r));if(!isFinite(r)||r<0)return 0;return Math.min(r,200);}
function clampRPE(p){p=Number(p);if(!isFinite(p)||p<=0)return null;return Math.min(10,Math.max(1,Math.round(p*2)/2));}

/* =============== exercise data =============== */
var MUSCLE_GROUPS=[["chest","Chest"],["back","Back"],["shoulders","Shoulders"],["biceps","Biceps"],["triceps","Triceps"],
  ["forearms","Forearms"],["abs","Abs"],["quads","Quads"],["hamstrings","Hamstrings"],["glutes","Glutes"],["calves","Calves"]]
  .map(function(m){return{id:m[0],label:m[1]};});
var MUSCLE_LABEL={};MUSCLE_GROUPS.forEach(function(m){MUSCLE_LABEL[m.id]=m.label;});
function EX(id,name,muscle,equip,secondary){return{id:id,name:name,muscle:muscle,equip:equip,secondary:secondary||[]};}
var SEED_EXERCISES=[
  EX("bench-press","Barbell Bench Press","chest","barbell",["triceps","shoulders"]),
  EX("incline-db-press","Incline Dumbbell Press","chest","dumbbell",["shoulders"]),
  EX("cable-fly","Cable Fly","chest","cable"),
  EX("pushups","Push-ups","chest","body",["triceps"]),
  EX("dips-chest","Chest Dips","chest","body",["triceps"]),
  EX("deadlift","Deadlift","back","barbell",["hamstrings","glutes"]),
  EX("pullups","Pull-ups","back","body",["biceps"]),
  EX("barbell-row","Barbell Row","back","barbell",["biceps"]),
  EX("lat-pulldown","Lat Pulldown","back","cable",["biceps"]),
  EX("seated-cable-row","Seated Cable Row","back","cable"),
  EX("ohp","Overhead Press","shoulders","barbell",["triceps"]),
  EX("lateral-raise","Lateral Raise","shoulders","dumbbell"),
  EX("rear-delt-fly","Rear Delt Fly","shoulders","dumbbell"),
  EX("arnold-press","Arnold Press","shoulders","dumbbell"),
  EX("front-raise","Front Raise","shoulders","dumbbell"),
  EX("barbell-curl","Barbell Curl","biceps","barbell"),
  EX("db-curl","Dumbbell Curl","biceps","dumbbell"),
  EX("hammer-curl","Hammer Curl","biceps","dumbbell",["forearms"]),
  EX("preacher-curl","Preacher Curl","biceps","machine"),
  EX("tricep-pushdown","Tricep Pushdown","triceps","cable"),
  EX("skullcrusher","Skullcrusher","triceps","barbell"),
  EX("overhead-ext","Overhead Tricep Extension","triceps","dumbbell"),
  EX("close-grip-bench","Close-Grip Bench Press","triceps","barbell",["chest"]),
  EX("wrist-curl","Wrist Curl","forearms","dumbbell"),
  EX("reverse-curl","Reverse Curl","forearms","barbell",["biceps"]),
  EX("farmers-carry","Farmer's Carry","forearms","dumbbell"),
  EX("hanging-leg-raise","Hanging Leg Raise","abs","body"),
  EX("cable-crunch","Cable Crunch","abs","cable"),
  EX("plank","Plank","abs","body"),
  EX("russian-twist","Russian Twist","abs","body"),
  EX("back-squat","Back Squat","quads","barbell",["glutes"]),
  EX("leg-press","Leg Press","quads","machine",["glutes"]),
  EX("leg-extension","Leg Extension","quads","machine"),
  EX("walking-lunge","Walking Lunge","quads","dumbbell",["glutes"]),
  EX("romanian-deadlift","Romanian Deadlift","hamstrings","barbell",["glutes"]),
  EX("leg-curl","Leg Curl","hamstrings","machine"),
  EX("good-morning","Good Morning","hamstrings","barbell",["back"]),
  EX("hip-thrust","Hip Thrust","glutes","barbell",["hamstrings"]),
  EX("cable-kickback","Cable Kickback","glutes","cable"),
  EX("bulgarian-split-squat","Bulgarian Split Squat","glutes","dumbbell",["quads"]),
  EX("standing-calf-raise","Standing Calf Raise","calves","machine"),
  EX("seated-calf-raise","Seated Calf Raise","calves","machine")
];
function allExercises(){return SEED_EXERCISES.concat(state.customExercises);}
function exercisesForMuscle(m){return allExercises().filter(function(e){return e.muscle===m;});}
function exerciseById(id){var a=allExercises();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}
function setsForExercise(id){return state.sets.filter(function(s){return s.exerciseId===id;}).sort(function(a,b){return a.timestamp-b.timestamp;});}
function addCustomExercise(name,muscle,equip){
  var ex={id:"custom-"+uid(),name:name,muscle:muscle,equip:equip||"dumbbell",secondary:[],custom:true};
  state.customExercises.push(ex);save();return ex;
}

/* =============== calc =============== */
function epley1RM(w,r){if(r<=0||w<=0)return 0;if(r===1)return w;return w*(1+r/30);}
var prCache=null;
function invalidatePRs(){prCache=null;}
function prMap(){
  if(prCache)return prCache;
  prCache={};
  var byEx={};
  state.sets.forEach(function(s){(byEx[s.exerciseId]=byEx[s.exerciseId]||[]).push(s);});
  Object.keys(byEx).forEach(function(exId){
    var chrono=byEx[exId].sort(function(a,b){return a.timestamp-b.timestamp;});
    var bw=0,b1=0;
    chrono.forEach(function(s){
      var recs=[],o=epley1RM(s.weight,s.reps);
      if(s.weight>bw){bw=s.weight;recs.push("weight");}
      if(o>b1){b1=o;recs.push("1rm");}
      if(recs.length)prCache[s.id]=recs;
    });
  });
  return prCache;
}
var SESSION_GAP=90*60000;
function getSessions(){
  var sorted=state.sets.slice().sort(function(a,b){return a.timestamp-b.timestamp;});
  var out=[],cur=null;
  sorted.forEach(function(s){
    if(!cur||s.timestamp-cur.end>SESSION_GAP){cur={id:s.timestamp,start:s.timestamp,end:s.timestamp,sets:[]};out.push(cur);}
    cur.sets.push(s);cur.end=s.timestamp;
  });
  out.forEach(function(ss){
    ss.volume=ss.sets.reduce(function(a,s){return a+s.weight*s.reps;},0);
    var ids={};ss.sets.forEach(function(s){ids[s.exerciseId]=1;});
    ss.exerciseIds=Object.keys(ids);
    var pm=prMap();
    ss.prCount=ss.exerciseIds.filter(function(id){
      return ss.sets.some(function(s){return s.exerciseId===id&&pm[s.id];});
    }).length;
  });
  return out;
}
function activeSession(){
  var ss=getSessions();if(!ss.length)return null;
  var last=ss[ss.length-1];
  if(Date.now()-last.end<SESSION_GAP&&last.id!==state.profile.lastFinished)return last;
  return null;
}
function logSet(e){
  var entry={id:uid(),timestamp:Date.now(),exerciseId:e.exerciseId,weight:clampW(e.weight),reps:clampReps(e.reps),rpe:clampRPE(e.rpe)};
  state.sets.push(entry);invalidatePRs();save();
  return{entry:entry,prTypes:prMap()[entry.id]||null};
}

var AC=null;

function tone(freq,start,dur,vol,type){

  ms=ms||600;var t0=null,settled=false;
  function step(t){
    if(settled)return;
    if(!t0)t0=t;var p=Math.min(1,(t-t0)/ms);p=1-Math.pow(1-p,3);

var overlayHost=document.getElementById("overlay-host");
function openSheet(html){
  var prevFocus=document.activeElement;
  var bd=el('<div class="sheet-backdrop"></div>'),sh=el('<div class="sheet" role="dialog" aria-modal="true"><div class="sheet-handle"></div>'+html+'</div>');
  overlayHost.appendChild(bd);overlayHost.appendChild(sh);
  requestAnimationFrame(function(){bd.classList.add("show");sh.classList.add("show");});
  var closed=false;
  function focusables(){return sh.querySelectorAll('button,input,select,textarea,[tabindex]:not([tabindex="-1"])');}
  function onKey(e){
    if(e.key==="Escape"){e.preventDefault();close();return;}
    if(e.key==="Tab"){
      var f=focusables();if(!f.length)return;
      var first=f[0],last=f[f.length-1];
      if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
      else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
    }
  }
  document.addEventListener("keydown",onKey,true);
  setTimeout(function(){if(!closed){var f=focusables();if(f.length)f[0].focus();}},360);
  function close(){
    if(closed)return;closed=true;
    document.removeEventListener("keydown",onKey,true);
    bd.classList.remove("show");sh.classList.remove("show");
    setTimeout(function(){bd.remove();sh.remove();},330);
    if(prevFocus&&prevFocus.focus){try{prevFocus.focus();}catch(e){}}
  }
  bd.onclick=close;
  return{node:sh,close:close};
}

var restTimer={endsAt:null,total:90,interval:null};

function startRest(){
  restTimer.total=state.profile.restDuration||90;
  restTimer.endsAt=Date.now()+restTimer.total*1000;
  restTimer.warned=false;
  if(restWatchIv)clearInterval(restWatchIv);

      var s=Math.max(0,Math.ceil(rem/1000));

}

function mountRestTimer(container){
  if(!restTimer.endsAt)return;

  container.insertBefore(node,container.firstChild);

  function tick(){
    var rem=Math.max(0,(restTimer.endsAt-Date.now())/1000),done=rem<=0;
    var mm=Math.floor(rem/60),ss=Math.floor(rem%60);
    var frac=Math.max(0,Math.min(1,rem/restTimer.total));
    var col=done?"var(--emerald-300)":"var(--gold-300)";
    node.innerHTML=
      '<div class="rt-ring"><svg width="52" height="52" viewBox="0 0 44 44">'+
      '<circle cx="22" cy="22" r="'+R+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="3.5"/>'+
      '<circle cx="22" cy="22" r="'+R+'" fill="none" stroke="'+(done?"#6fd5a8":"#cda144")+'" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+(C*(1-frac))+'"/></svg>'+
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:'+col+'">'+I.timer+'</div></div>'+
      '<div style="flex:1"><div style="font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);font-weight:700">'+(done?"Rest complete":"Resting")+'</div>'+
      '<div class="rt-time" style="color:'+col+'">'+(done?"Ready":mm+":"+(ss<10?"0":"")+ss)+'</div></div>'+
      '<div class="rt-actions">'+

    var add=node.querySelector("#rt-add");

    if(!restTimer.endsAt||!document.getElementById("rest-timer")){clearInterval(restTimer.interval);restTimer.interval=null;return;}

/* =============== insights =============== */
function computeInsight(){
  var vol=computeVolumes(21);
  var pairs=[
    {a:"Push",b:"Pull",av:vol.chest+vol.shoulders+vol.triceps,bv:vol.back+vol.biceps,
     fix:{muscle:"back",label:"pulling"}},
    {a:"Quads",b:"Hamstrings",av:vol.quads,bv:vol.hamstrings,fix:{muscle:"hamstrings",label:"hamstring"}}
  ];
  var best=null;
  pairs.forEach(function(p){
    if(p.av<=0&&p.bv<=0)return;
    var hi=Math.max(p.av,p.bv),lo=Math.min(p.av,p.bv);
    if(hi<=0)return;
    var ratio=lo/hi;
    if(ratio<0.65&&(!best||ratio<best.ratio)){
      var lag=p.av<p.bv?p.a:p.b;
      var lagMuscle=p.av<p.bv?(p.a==="Push"?"chest":"quads"):(p.fix.muscle);
      best={ratio:ratio,hiName:p.av>p.bv?p.a:p.b,loName:lag,pct:Math.round((1-ratio)*100),
        muscle:p.av<p.bv?(p.a==="Quads"?"quads":"chest"):p.fix.muscle};
    }
  });
  return best;
}

/* =============== import sanitation =============== */
function sanitizeImport(incoming){
  var d=defaults(),report={sets:0,dropped:0};
  var equips={barbell:1,dumbbell:1,cable:1,machine:1,body:1};
  (Array.isArray(incoming.customExercises)?incoming.customExercises:[]).forEach(function(e){
    if(e&&typeof e.id==="string"&&typeof e.name==="string"&&MUSCLE_LABEL[e.muscle]){
      d.customExercises.push({id:e.id,name:String(e.name).slice(0,80),muscle:e.muscle,
        equip:equips[e.equip]?e.equip:"dumbbell",secondary:[],custom:true});
    }
  });
  var known={};SEED_EXERCISES.concat(d.customExercises).forEach(function(e){known[e.id]=1;});
  (Array.isArray(incoming.sets)?incoming.sets:[]).forEach(function(s){
    if(!s||typeof s.exerciseId!=="string"||!known[s.exerciseId]){report.dropped++;return;}
    var w=clampW(s.weight),rp=clampReps(s.reps),t=Number(s.timestamp);
    if(w<=0||rp<=0||!isFinite(t)||t<=0||t>Date.now()+864e5){report.dropped++;return;}
    d.sets.push({id:typeof s.id==="string"?s.id:uid(),exerciseId:s.exerciseId,weight:w,reps:rp,rpe:clampRPE(s.rpe),timestamp:t});
    report.sets++;
  });
  (Array.isArray(incoming.templates)?incoming.templates:[]).forEach(function(t){
    if(t&&typeof t.name==="string"&&Array.isArray(t.exerciseIds)){
      var ids=t.exerciseIds.filter(function(id){return known[id];});
      if(ids.length)d.templates.push({id:typeof t.id==="string"?t.id:uid(),name:String(t.name).slice(0,40),exerciseIds:ids});
    }
  });
  var pr=(incoming.profile&&typeof incoming.profile==="object")?incoming.profile:{};
  d.profile.name=typeof pr.name==="string"?pr.name.slice(0,40):"";
  d.profile.unit=pr.unit==="kg"?"kg":"lb";
  d.profile.restDuration=[60,90,120,180].indexOf(Number(pr.restDuration))>=0?Number(pr.restDuration):90;
  d.profile.onboarded=true;
  return{state:d,report:report};
}

function openPlateSheet(displayWeight){
  var isKg=unit()==="kg";
  var bar=isKg?20:45;
  var plates=isKg?[20,15,10,5,2.5,1.25]:[45,35,25,10,5,2.5];
  var per=(displayWeight-bar)/2;
  var html;
  if(displayWeight<=bar){
    html='<p style="color:var(--ink-2);font-size:14px">'+displayWeight+' '+unit()+' is at or below the bar ('+bar+' '+unit()+'). Just the bar today.</p>';
  }else{
    var left=per,picks=[];
    plates.forEach(function(p){while(left>=p-1e-9){picks.push(p);left-=p;}});
    html='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+
      picks.map(function(p){var h=34+plates.indexOf(p)*-2;var big=p>=plates[0];
        return'<div style="min-width:40px;text-align:center;padding:'+(big?12:8)+'px 6px;border-radius:8px;background:linear-gradient(155deg,rgba(205,161,68,.28),rgba(205,161,68,.1));border:1px solid rgba(205,161,68,.4);font-weight:800;font-size:12.5px">'+p+'</div>';}).join("")+
      '</div><p style="color:var(--ink-2);font-size:13px">Per side · '+bar+' '+unit()+' bar'+(left>0.01?' · '+(Math.round(left*100)/100)+' '+unit()+' unloadable remainder':'')+'</p>';
  }
  openSheet('<h2>Plate math — '+displayWeight+' '+unit()+'</h2>'+html);
}

function screenExercise(exId){
  var ex=exerciseById(exId);
  var root=el('<div class="screen"></div>');
  if(!ex){
    root.appendChild(el('<div class="empty"><span>Exercise not found.</span></div>'));
    return root;
  }
  var history=setsForExercise(exId);
  var d=logDraft[exId];
  if(!d){var lastSet=history[history.length-1];
    d={weight:lastSet?lastSet.weight:fromDisp(unit()==="kg"?20:45),reps:lastSet?lastSet.reps:8,rpe:null,metric:"weight"};logDraft[exId]=d;}

  var hdr=el('<div class="page-header"><div class="ph-left"></div></div>');

  root.appendChild(hdr);
  mountRestTimer(root);

  /* last-time ghost: most recent prior-day session containing this exercise */
  var sessions=getSessions();
  var prevSession=null;
  var sodGhost=new Date();sodGhost.setHours(0,0,0,0);
  for(var i=sessions.length-1;i>=0;i--){
    var ss=sessions[i];
    if(ss.end>=sodGhost.getTime())continue;
    var mine=ss.sets.filter(function(s){return s.exerciseId===exId;});
    if(mine.length){prevSession={date:ss.start,sets:mine};break;}
  }
  if(prevSession){
    root.appendChild(el('<div class="ghost-line">'+
      '<span style="color:var(--ink-3);font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase">Last time · '+new Date(prevSession.date).toLocaleDateString(undefined,{month:"short",day:"numeric"})+'</span>'+
      '<span style="font-weight:700">'+prevSession.sets.map(function(s){return fmtW(s.weight)+"×"+s.reps;}).join(" · ")+'</span></div>'));
  }

  /* progression hint */
  (function(){
    var perSession=[];
    sessions.forEach(function(ss){
      var mine=ss.sets.filter(function(s){return s.exerciseId===exId;});
      if(mine.length)perSession.push(mine);
    });
    if(perSession.length>=3){
      var last3=perSession.slice(-3);

      var same=Math.abs(tops[0]-tops[1])<1e-6&&Math.abs(tops[1]-tops[2])<1e-6;
      var easy=last3.every(function(m){return m.every(function(s){return!s.rpe||s.rpe<=8;});});
      if(same&&easy){
        var inc=unit()==="kg"?2.5:5;
        root.appendChild(el('<div class="hint-chip">'+I.bulb+' Three sessions at '+fmtW(tops[2])+' '+unit()+' — try +'+inc+' '+unit()+' today</div>'));
      }
    }
  })();

  /* log form */
  var form=el('<div class="glass" style="padding:17px;margin-bottom:14px;position:relative"></div>');
  form.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px"><div class="section-label" style="margin:0">Log a Set</div></div>'));
  if(ex.equip==="barbell"){
    var pb=el('<button class="btn-ghost tap" style="position:absolute;top:12px;right:14px;padding:7px 12px;font-size:11px;font-weight:700;display:flex;gap:6px;align-items:center">'+I.scale+' Plates</button>');
    pb.onclick=function(){openPlateSheet(toDisp(d.weight));};
    form.appendChild(pb);
  }
  var fields=el('<div style="display:flex;gap:10px;margin-bottom:13px"></div>');
  var wCol=el('<div style="flex:1"><div class="field-label">Weight ('+unit()+')</div></div>');
  var wInput=el('<input type="number" inputmode="decimal" class="search-input"/>');wInput.value=toDisp(d.weight);
  wInput.oninput=function(){d.weight=clampW(fromDisp(Number(wInput.value)||0));};
  wCol.appendChild(wInput);
  var wInc=el('<div style="display:flex;gap:6px;margin-top:8px"></div>');
  incSteps().forEach(function(step){
    var b=el('<button class="btn-ghost tap inc-btn">'+(step>0?"+"+step:step)+'</button>');
    b.onclick=function(){
      var cur=toDisp(d.weight);var next=Math.max(0,Math.round((cur+step)*100)/100);

  wCol.appendChild(wInc);fields.appendChild(wCol);
  var rCol=el('<div style="width:92px"><div class="field-label">Reps</div></div>');

  rInput.oninput=function(){d.reps=clampReps(rInput.value);};
  rCol.appendChild(rInput);
  var rInc=el('<div style="display:flex;gap:6px;margin-top:8px"></div>');
  [["−1",-1],["+1",1]].forEach(function(pp){
    var b=el('<button class="btn-ghost tap inc-btn">'+pp[0]+'</button>');
    b.onclick=function(){d.reps=Math.max(0,d.reps+pp[1]);rInput.value=d.reps;buzz(8);};
    rInc.appendChild(b);
  });
  rCol.appendChild(rInc);fields.appendChild(rCol);
  form.appendChild(fields);

  var host=el('<div></div>');chartCard.appendChild(host);
  function drawChart(){
    host.innerHTML="";
    var byDay={},order=[];
    history.forEach(function(s){
      var k=dayKey(s.timestamp);
      if(!byDay[k]){byDay[k]={w:0,vol:0,orm:0,ts:s.timestamp,pr:false};order.push(k);}

    }
    var data=order.map(function(k){var o=byDay[k];
      return{label:new Date(o.ts).toLocaleDateString(undefined,{month:"short",day:"numeric"}),
        v:d.metric==="weight"?toDisp(o.w):d.metric==="volume"?toDisp(o.vol):toDisp(o.orm),pr:o.pr};});
    var vals=data.map(function(p){return p.v;});
    var maxV=Math.max.apply(null,vals),minV=Math.min.apply(null,vals);
    if(maxV===minV){maxV+=maxV*.15||10;minV=Math.max(0,minV-(minV*.15||10));}
    var W=340,H=180,padL=40,padR=12,padT=12,padB=24,iw=W-padL-padR,ih=H-padT-padB;
    function X(i){return padL+(data.length===1?iw/2:iw*i/(data.length-1));}
    function Y(v){return padT+ih*(1-(v-minV)/(maxV-minV||1));}
    var grid="",labels="";
    for(var g=0;g<=4;g++){
      var gy=padT+ih*g/4,gv=maxV-(maxV-minV)*g/4;
      grid+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="rgba(255,255,255,.06)"/>';
      labels+='<text x="'+(padL-7)+'" y="'+(gy+3).toFixed(1)+'" text-anchor="end" fill="var(--ink-3)" font-size="10">'+Math.round(gv)+'</text>';
    }
    var pts=data.map(function(p,i){return X(i)+","+Y(p.v);}).join(" ");
    var area=padL+","+(H-padB)+" "+pts+" "+(W-padR)+","+(H-padB);
    var dots=data.map(function(p,i){
      return p.pr
        ?'<circle cx="'+X(i)+'" cy="'+Y(p.v)+'" r="4.5" fill="#f4e3ad" stroke="#8a6521" stroke-width="1.5"/>'
        :'<circle cx="'+X(i)+'" cy="'+Y(p.v)+'" r="3" fill="#cda144"/>';
    }).join("");
    var xl=[0,Math.floor((data.length-1)/2),data.length-1].map(function(i){
      return'<text x="'+X(i)+'" y="'+(H-6)+'" text-anchor="middle" fill="var(--ink-3)" font-size="10">'+data[i].label+'</text>';}).join("");
    host.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:180px" role="img" aria-label="'+d.metric+' trend">'+
      grid+labels+
      '<polygon points="'+area+'" fill="rgba(205,161,68,.07)"/>'+
      '<polyline points="'+pts+'" fill="none" stroke="#cda144" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
      dots+xl+'</svg>'+
      '<div style="display:flex;gap:14px;margin-top:6px;font-size:10.5px;color:var(--ink-3)"><span><span style="color:#f4e3ad">●</span> PR day</span><span>'+(d.metric==="volume"?"Total per day":"Best per day")+' · '+unit()+'</span></div>';
  }
  drawChart();
  root.appendChild(chartCard);
  return root;
}

    }else{
      var s2=el('<div class="onboard-step"><div class="eyebrow">The Heat Map</div><h1>Your body,<br/>as a canvas.</h1>'+
        '<p>Every set you log paints the muscle it trained. Cool means rested, gold means working, red means redlining. Balance the canvas, build the body.</p>'+
        '<div id="ob-legend" style="margin-top:24px"></div></div>');
      host.appendChild(s2);
      s2.querySelector("#ob-legend").appendChild(heatLegend());
    }
    var footer=el('<div style="margin-top:34px">'+dots+'</div>');
    var go=el('<button class="btn-primary tap" style="width:100%;padding:16px;font-size:15px">'+(step<2?"Continue":"Begin")+'</button>');
    go.onclick=function(){
      if(step<2){step++;draw();}
      else{
        state.profile.name=name.trim();state.profile.unit=u;state.profile.onboarded=true;save();
        host.style.transition="opacity .4s";host.style.opacity="0";
        setTimeout(function(){host.remove();render();},400);
      }
    };
    footer.appendChild(go);host.appendChild(footer);
  }
  draw();
}

/* =============== render =============== */
var lastRouteHash=null;
function render(){
  var r=parseHash();
  var route=r.parts[0]||"";
  var sameRoute=location.hash===lastRouteHash;
  var keepScroll=sameRoute?content.scrollTop:0;
  var depth=DEPTH[route]!==undefined?DEPTH[route]:0;
  var animClass=depth>lastDepth?"anim-push":depth<lastDepth?"anim-pop":"anim-fade";
  lastDepth=depth;lastRouteHash=location.hash;
  content.innerHTML="";
  var active="/",node;
  if(route==="body")      {active="/body";node=screenBody();}
  else if(route==="progress"){active="/progress";node=screenProgress();}
  else if(route==="muscle"){active="";node=screenMuscle(r.parts[1]);}
  else if(route==="exercise"){active="";node=screenExercise(r.parts[1]);}
  else if(route==="session"){active="";node=screenSession(r.parts[1]);}
  else if(route==="settings"){active="";node=screenSettings();}
  else                    {active="/";node=screenDashboard();}
  if(!sameRoute)node.classList.add(animClass);
  content.appendChild(node);
  renderTabBar(active);
  renderTray();
  content.scrollTop=keepScroll;
}
/* multi-tab sync: another tab wrote — adopt its state */
window.addEventListener("storage",function(e){
  if(e.key!==KEY)return;
  state=loadState();invalidatePRs();render();
});
/* ask the browser not to evict our storage */
try{if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();}catch(e){}
/* PWA manifest, built at runtime so the icon isn't embedded twice */
try{
  var iconLink=document.querySelector('link[rel="apple-touch-icon"]');
  var man={name:"Forge — Private Training",short_name:"Forge",display:"standalone",
    background_color:"#08070a",theme_color:"#08070a",start_url:".",
    icons:[{src:iconLink.href,sizes:"180x180",type:"image/png"}]};
  var ml=document.createElement("link");ml.rel="manifest";
  ml.href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"}));
  document.head.appendChild(ml);
}catch(e){}
window.addEventListener("hashchange",function(){muscleSearch="";bodySearch="";render();});
render();
if(!state.profile.onboarded)showOnboarding();
</script>
